kind = "web"
previewPath = "/"
title = "Country Draft"
version = "1.0.0"
id = "artifacts/country-draft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26097

[services.development]
run = "pnpm --filter @workspace/country-draft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/country-draft", "run", "build" ]
publicDir = "artifacts/country-draft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26097"
BASE_PATH = "/"
